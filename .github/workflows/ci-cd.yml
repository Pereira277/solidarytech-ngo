name: ngo-service CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: solidarytech-ngo
  GITOPS_REPO: Pereira277/solidarytech-infra

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app.py

  security-and-lint:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 bandit

      - name: flake8
        run: flake8 app.py --max-line-length=120

      - name: bandit
        run: bandit -r app.py --skip B104

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"

  docker-build-and-scan:
    runs-on: ubuntu-latest
    needs: security-and-lint
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        id: build
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE="${REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker build -t "${IMAGE}" .
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.image }}
          severity: CRITICAL
          exit-code: "1"

      - name: Push image to ECR
        run: docker push ${{ steps.build.outputs.image }}

  update-gitops:
    runs-on: ubuntu-latest
    needs: docker-build-and-scan
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: Update deployment image tag
        run: |
          NEW_IMAGE="${{ needs.docker-build-and-scan.outputs.image }}"
          sed -i "s|image: .*solidarytech-ngo.*|image: ${NEW_IMAGE}|" \
            gitops/ngo-service/ngo-deployment.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/ngo-service/ngo-deployment.yaml
          git commit -m "ci: update ngo-service image to ${{ github.sha }}"
          git push
